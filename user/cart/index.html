<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Shopping Cart - zaki">
    <title>My Cart - zaki</title>
  </head>
  <body data-page="cart">
    <div id="app" class="app-root">
      <main class="boot-shell">
        <section class="boot-panel" aria-live="polite">
          <div class="brand-mark">z</div>
          <div><h1>zaki</h1><p>Loading your cart.</p></div>
        </section>
      </main>
    </div>
    <noscript>This ecommerce app needs JavaScript enabled.</noscript>
    <script type="module">
      import { supabase, hasSupabaseConfig } from '/src/lib/supabase.js';
      import '/src/app.css';

      const apiBaseUrl = (import.meta.env.VITE_API_BASE_URL || 'http://localhost:8000').replace(/\/+$/, '');
      const app = document.querySelector('#app');

      const state = {
        session: null,
        cartItems: [],
        selectedCategory: 'all',
        addresses: [],
        selectedAddress: null,
        loading: true,
        error: null,
        showAddressModal: false
      };

      function escapeHtml(text = '') {
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
        return String(text).replace(/[&<>"']/g, c => map[c]);
      }

      function formatMoney(paise) {
        return new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR' }).format(Number(paise || 0) / 100);
      }

      function getDiscount(original, current) {
        const orig = Number(original || current);
        const curr = Number(current);
        return Math.round(((orig - curr) / orig) * 100);
      }

      function renderStars(rating) {
        const rate = Number(rating) || 4;
        const fullStars = Math.floor(rate);
        return `<span style="color: var(--green); font-weight: 800;">★★★★★</span> ${rate}`;
      }

      function renderCartItem(item) {
        const original = item.pricePaise * 1.55;
        const discount = getDiscount(original, item.pricePaise);

        return `
          <div style="border: 1px solid var(--line); border-radius: 8px; padding: 14px; margin-bottom: 12px; background: white;">
            <div style="display: grid; grid-template-columns: 100px minmax(0, 1fr); gap: 14px; margin-bottom: 12px;">
              <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=150&q=80"
                   alt="${escapeHtml(item.name || 'Product')}"
                   style="width: 100px; height: 100px; border-radius: 8px; object-fit: cover;">
              <div>
                <h3 style="margin: 0 0 4px; font-size: 0.95rem; line-height: 1.3; color: var(--ink);">${escapeHtml(item.name || 'Product')}</h3>
                <div style="display: flex; align-items: center; gap: 8px; margin: 6px 0; font-size: 0.85rem;">
                  <span style="color: var(--green); font-weight: 800;">★★★★★</span>
                  <span style="color: var(--muted);">4.5 | ${12407}</span>
                  <span style="background: #dcfce7; color: var(--green); padding: 2px 6px; border-radius: 3px; font-size: 0.75rem; font-weight: 800;">Assured</span>
                </div>
                <div style="display: flex; gap: 10px; align-items: center; margin: 8px 0;">
                  <span style="font-weight: 800; font-size: 1.1rem; color: var(--ink);">${formatMoney(item.pricePaise)}</span>
                  <span style="text-decoration: line-through; color: var(--muted); font-size: 0.9rem;">${formatMoney(original)}</span>
                  <span style="color: var(--green); font-weight: 800; font-size: 0.9rem;">↓${discount}%</span>
                </div>
                <div style="color: var(--blue); font-size: 0.85rem; font-weight: 800; margin: 4px 0;">
                  <span style="background: var(--blue); color: white; padding: 2px 6px; border-radius: 3px;">WOW</span>
                  ${formatMoney((item.pricePaise * 0.15).toFixed(0))} with UPI offer
                </div>
                <div style="color: var(--muted); font-size: 0.85rem; margin-top: 6px;">✓ Delivery in 2 days</div>
              </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; padding-top: 12px; border-top: 1px solid var(--line);">
              <div style="display: flex; gap: 12px; align-items: center;">
                <select onchange="window.updateQuantity('${escapeHtml(item.productId)}', this.value)"
                  style="padding: 6px 10px; border: 1px solid var(--line); border-radius: 4px; font-weight: 800; cursor: pointer;">
                  ${Array.from({length: 20}, (_, i) => `<option value="${i+1}" ${item.quantity === i+1 ? 'selected' : ''}>${i+1}</option>`).join('')}
                </select>
                <button onclick="window.saveForLater('${escapeHtml(item.productId)}')"
                  style="background: none; border: none; color: var(--blue); cursor: pointer; font-weight: 800; font-size: 0.85rem;">📌 Save for later</button>
              </div>
              <button onclick="window.removeItem('${escapeHtml(item.productId)}')"
                style="background: none; border: none; color: var(--red); cursor: pointer; font-weight: 800; font-size: 0.85rem;">✕ Remove</button>
            </div>
          </div>
        `;
      }

      function getCartTotal() {
        return state.cartItems.reduce((sum, item) => sum + (Number(item.pricePaise || 0) * Number(item.quantity || 1)), 0);
      }

      function getCartCount() {
        return state.cartItems.reduce((sum, item) => sum + Number(item.quantity || 0), 0);
      }

      function renderPage() {
        const total = getCartTotal();
        const count = getCartCount();

        const pageHtml = `
          <div style="min-height: 100vh; background: var(--page); padding-bottom: 80px;">
            <!-- Header -->
            <div style="background: white; padding: 14px 16px; border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 20; display: flex; align-items: center; gap: 12px;">
              <button onclick="window.history.back()" style="background: none; border: none; font-size: 24px; cursor: pointer; color: var(--ink); padding: 0; width: 36px; height: 36px; display: grid; place-items: center;">←</button>
              <h1 style="margin: 0; font-size: 1.25rem; font-weight: 900; flex: 1;">My Cart</h1>
            </div>

            <!-- Category Tabs -->
            <div style="background: white; padding: 12px 16px; border-bottom: 1px solid var(--line); display: flex; gap: 20px; position: sticky; top: 56px; z-index: 19;">
              <button onclick="window.selectCategory('flipkart')"
                style="border: none; background: none; cursor: pointer; padding: 8px 0; border-bottom: ${state.selectedCategory === 'flipkart' ? '3px solid var(--blue)' : '3px solid transparent'}; color: ${state.selectedCategory === 'flipkart' ? 'var(--blue)' : 'var(--muted)'}; font-weight: 900; transition: all 160ms ease;">
                Flipkart (${count})
              </button>
              <button onclick="window.selectCategory('minutes')"
                style="border: none; background: none; cursor: pointer; padding: 8px 0; border-bottom: ${state.selectedCategory === 'minutes' ? '3px solid var(--blue)' : '3px solid transparent'}; color: ${state.selectedCategory === 'minutes' ? 'var(--blue)' : 'var(--muted)'}; font-weight: 900; transition: all 160ms ease;">
                Minutes (1)
              </button>
            </div>

            <!-- Address Section -->
            <div style="background: white; padding: 16px; border-bottom: 1px solid var(--line);">
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <span style="color: var(--muted); font-weight: 800;">From Saved Addresses</span>
                <a href="#" onclick="alert('Change Address'); return false;" style="color: var(--blue); text-decoration: none; font-weight: 900; font-size: 0.9rem;">Change</a>
              </div>
              <div style="padding: 10px; background: var(--soft); border-radius: 4px; font-size: 0.9rem; color: var(--ink);">
                📍 Home • 123, Main Street, City 560001
              </div>
              <a href="#" onclick="alert('Enter pincode'); return false;" style="color: var(--blue); text-decoration: none; font-weight: 900; font-size: 0.9rem; margin-top: 10px; display: inline-block;">📍 Enter Delivery Pincode</a>
            </div>

            <!-- Cart Items -->
            <div style="padding: 16px;">
              ${state.cartItems.length > 0 ? state.cartItems.map(renderCartItem).join('') : '<div style="padding: 40px; text-align: center; color: var(--muted);">Your cart is empty</div>'}
            </div>

            <!-- Summary Bar -->
            <div style="position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid var(--line); padding: 12px 16px; box-shadow: 0 -2px 8px rgba(0,0,0,0.1); z-index: 30;">
              <div style="display: grid; grid-template-columns: 1fr auto; gap: 16px; align-items: center;">
                <div>
                  <div style="color: var(--muted); font-size: 0.85rem; margin-bottom: 2px;">Total: <span style="color: var(--ink); font-weight: 900; font-size: 1.1rem;">${formatMoney(total)}</span></div>
                  <div style="color: var(--muted); font-size: 0.85rem;">${count} item${count !== 1 ? 's' : ''}</div>
                </div>
                <button onclick="window.placeOrder()"
                  style="background: var(--yellow); border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: 900; color: var(--ink); font-size: 1rem; transition: all 160ms ease; min-width: 140px;">
                  Place Order
                </button>
              </div>
            </div>
          </div>
        `;

        app.innerHTML = pageHtml;
      }

      window.selectCategory = function(category) {
        state.selectedCategory = category;
        renderPage();
      };

      window.updateQuantity = function(productId, quantity) {
        const item = state.cartItems.find(i => i.productId === productId);
        if (item) {
          item.quantity = Number(quantity);
          renderPage();
        }
      };

      window.removeItem = function(productId) {
        state.cartItems = state.cartItems.filter(i => i.productId !== productId);
        renderPage();
      };

      window.saveForLater = function(productId) {
        alert('Item saved for later');
      };

      window.placeOrder = function() {
        if (state.cartItems.length === 0) {
          alert('Your cart is empty');
          return;
        }
        // Navigate to summary page
        window.location.href = '/payment/?step=summary';
      };

      async function checkAuth() {
        if (!hasSupabaseConfig || !supabase) {
          state.error = 'Supabase is not configured.';
          return false;
        }

        const { data: { session } } = await supabase.auth.getSession();
        if (!session) {
          window.location.href = '/login/?next=' + encodeURIComponent(window.location.pathname);
          return false;
        }

        state.session = session;
        return true;
      }

      async function loadCart() {
        try {
          // Mock cart data - replace with actual API call
          state.cartItems = [
            { productId: 'watch-1', name: 'PETER ENGLAND Analog Watch - For Men', pricePaise: 122400, quantity: 1 },
            { productId: 'oil-1', name: 'Aone 1000 ml Cooking Oil Dispenser', pricePaise: 36000, quantity: 2 },
            { productId: 'earbuds-1', name: 'boAt Nirvana Ion with 120 Hours Playtime', pricePaise: 299900, quantity: 1 }
          ];
        } catch (error) {
          state.error = error.message;
        } finally {
          state.loading = false;
        }
      }

      async function init() {
        if (!(await checkAuth())) return;
        await loadCart();
        renderPage();
      }

      init();
    </script>
  </body>
</html>
