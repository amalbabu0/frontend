<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="zaki - Your Online Marketplace">
    <title>zaki</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        background: linear-gradient(135deg, #0066cc 0%, #0052a3 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .splash-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        max-width: 500px;
        padding: 40px 20px;
        text-align: center;
      }

      /* Animated Background Elements */
      .animated-bg {
        position: fixed;
        inset: 0;
        overflow: hidden;
        z-index: 0;
      }

      .blob {
        position: absolute;
        opacity: 0.1;
        border-radius: 50%;
      }

      .blob-1 {
        width: 300px;
        height: 300px;
        background: white;
        top: -100px;
        right: -100px;
        animation: float 6s ease-in-out infinite;
      }

      .blob-2 {
        width: 200px;
        height: 200px;
        background: white;
        bottom: -50px;
        left: -50px;
        animation: float 8s ease-in-out infinite 1s;
      }

      @keyframes float {
        0%, 100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(30px);
        }
      }

      .splash-content {
        position: relative;
        z-index: 10;
      }

      /* Logo Animation */
      .logo-wrapper {
        margin-bottom: 30px;
        perspective: 1000px;
        position: relative;
      }

      .logo {
        width: 120px;
        height: 120px;
        background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
        border-radius: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 60px;
        font-weight: 900;
        color: #0066cc;
        margin: 0 auto 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        animation: scaleIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        position: relative;
        z-index: 2;
      }

      @keyframes scaleIn {
        0% {
          transform: scale(0) rotateZ(-180deg);
          opacity: 0;
        }
        100% {
          transform: scale(1) rotateZ(0deg);
          opacity: 1;
        }
      }

      /* Pulse Ring */
      .pulse-ring {
        position: absolute;
        width: 120px;
        height: 120px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-radius: 30px;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        animation: pulse 2s ease-out infinite;
        z-index: 1;
      }

      @keyframes pulse {
        0% {
          transform: translateX(-50%) scale(1);
          opacity: 1;
        }
        100% {
          transform: translateX(-50%) scale(1.3);
          opacity: 0;
        }
      }

      /* App Name */
      .app-name {
        font-size: 48px;
        font-weight: 900;
        color: white;
        margin-bottom: 12px;
        letter-spacing: -1px;
        animation: slideUp 0.8s ease-out 0.2s backwards;
      }

      @keyframes slideUp {
        0% {
          opacity: 0;
          transform: translateY(30px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Tagline */
      .tagline {
        font-size: 16px;
        color: rgba(255, 255, 255, 0.8);
        margin-bottom: 40px;
        letter-spacing: 0.5px;
        animation: slideUp 0.8s ease-out 0.4s backwards;
      }

      /* Loading Bar */
      .loading-container {
        width: 100%;
        margin-bottom: 30px;
      }

      .loading-bar {
        width: 100%;
        height: 4px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 2px;
        overflow: hidden;
        animation: slideUp 0.8s ease-out 0.6s backwards;
      }

      .loading-fill {
        height: 100%;
        background: linear-gradient(90deg, #fff 0%, rgba(255, 255, 255, 0.5) 100%);
        border-radius: 2px;
        animation: loading 2s ease-in-out infinite;
      }

      @keyframes loading {
        0% {
          width: 0%;
        }
        50% {
          width: 100%;
        }
        100% {
          width: 100%;
        }
      }

      /* Loading Text */
      .loading-text {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.6);
        margin-top: 8px;
        animation: slideUp 0.8s ease-out 0.6s backwards;
        letter-spacing: 0.5px;
      }

      /* Features List */
      .features {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-top: 40px;
        animation: slideUp 0.8s ease-out 0.8s backwards;
      }

      .feature {
        padding: 15px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        transition: all 0.3s ease;
      }

      .feature:hover {
        background: rgba(255, 255, 255, 0.15);
        transform: translateY(-5px);
      }

      .feature-icon {
        font-size: 24px;
        margin-bottom: 8px;
      }

      .feature-name {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.9);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      /* Bottom Text */
      .bottom-text {
        position: absolute;
        bottom: 30px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.5);
        animation: slideUp 0.8s ease-out 1s backwards;
      }

      /* Dots Animation */
      .dots {
        display: inline-block;
        margin-left: 4px;
      }

      .dot {
        display: inline-block;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.6);
        margin: 0 2px;
        animation: dot-pulse 1.4s infinite;
      }

      .dot:nth-child(2) {
        animation-delay: 0.2s;
      }

      .dot:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes dot-pulse {
        0%, 60%, 100% {
          opacity: 0.5;
        }
        30% {
          opacity: 1;
        }
      }

      /* Responsive */
      @media (max-width: 600px) {
        .splash-container {
          max-width: 100%;
        }

        .app-name {
          font-size: 36px;
        }

        .logo {
          width: 100px;
          height: 100px;
          font-size: 48px;
        }

        .pulse-ring {
          width: 100px;
          height: 100px;
        }

        .features {
          grid-template-columns: 1fr;
        }
      }

      /* Hide on load */
      .splash-container.loaded {
        animation: fadeOut 0.6s ease-out forwards;
      }

      @keyframes fadeOut {
        0% {
          opacity: 1;
        }
        100% {
          opacity: 0;
          pointer-events: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- Animated Background -->
    <div class="animated-bg">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
    </div>

    <!-- Splash Screen -->
    <div class="splash-container">
      <div class="splash-content">
        <!-- Logo -->
        <div class="logo-wrapper">
          <div class="pulse-ring"></div>
          <div class="logo">z</div>
        </div>

        <!-- App Name -->
        <h1 class="app-name">zaki</h1>

        <!-- Tagline -->
        <p class="tagline">Your Online Marketplace</p>

        <!-- Features -->
        <div class="features">
          <div class="feature">
            <div class="feature-icon">📦</div>
            <div class="feature-name">Fast Delivery</div>
          </div>
          <div class="feature">
            <div class="feature-icon">💰</div>
            <div class="feature-name">Best Prices</div>
          </div>
          <div class="feature">
            <div class="feature-icon">🛡️</div>
            <div class="feature-name">Secure Payment</div>
          </div>
          <div class="feature">
            <div class="feature-icon">⭐</div>
            <div class="feature-name">100% Authentic</div>
          </div>
        </div>

        <!-- Loading Bar -->
        <div class="loading-container" style="margin-top: 40px;">
          <div class="loading-bar">
            <div class="loading-fill"></div>
          </div>
          <div class="loading-text">
            Loading<span class="dots">
              <span class="dot"></span>
              <span class="dot"></span>
              <span class="dot"></span>
            </span>
          </div>
        </div>
      </div>
    </div>

    <!-- Bottom Text -->
    <div class="bottom-text">Made with ❤️ in India</div>

    <script>
      // Auto-hide splash after 3 seconds
      setTimeout(() => {
        const splash = document.querySelector('.splash-container');
        splash.classList.add('loaded');

        // Navigate to home page after fade out
        setTimeout(() => {
          window.location.href = '/';
        }, 600);
      }, 3000);

      // Allow manual close by clicking
      document.addEventListener('click', () => {
        const splash = document.querySelector('.splash-container');
        if (!splash.classList.contains('loaded')) {
          splash.classList.add('loaded');
          setTimeout(() => {
            window.location.href = '/';
          }, 600);
        }
      });

      // Skip on key press
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' || e.key === 'Enter') {
          const splash = document.querySelector('.splash-container');
          if (!splash.classList.contains('loaded')) {
            splash.classList.add('loaded');
            setTimeout(() => {
              window.location.href = '/';
            }, 600);
          }
        }
      });
    </script>
  </body>
</html>
